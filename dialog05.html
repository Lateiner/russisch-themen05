<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Übung: Chat mit Ира</title>
    <style>
        :root {
            --ira-bubble: #e1f5fe;
            --user-bubble: #ffffff;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f0f2f5;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            background: #fff;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* Header */
        header {
            background: var(--accent);
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: #eee;
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        header .info h2 {
            margin: 0;
            font-size: 1.1rem;
        }

        header .info p {
            margin: 0;
            font-size: 0.8rem;
            opacity: 0.9;
        }

        /* Chat-Verlauf */
        .chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #e5ddd5; 
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 1rem;
            line-height: 1.4;
            position: relative;
            animation: popIn 0.3s ease;
        }

        .ira-msg {
            align-self: flex-start;
            background: var(--ira-bubble);
            border-top-left-radius: 2px;
            color: var(--text);
        }

        .user-msg {
            align-self: flex-end;
            background: #dcf8c6;
            border-top-right-radius: 2px;
            color: var(--text);
        }

        /* Typing Indicator */
        .typing {
            font-style: normal;
            font-size: 0.85rem;
            color: #555;
            padding: 10px 20px;
            background: rgba(255,255,255,0.5);
            display: none;
        }

        /* Optionen-Bereich */
        .options-area {
            background: #f0f0f0;
            padding: 15px;
            border-top: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }

        .option-btn {
            background: white;
            border: 1px solid #ccc;
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-size: 0.95rem;
            transition: all 0.2s;
            color: var(--text);
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: #f9f9f9;
        }

        .correct-opt {
            background: var(--success) !important;
            color: white;
            border-color: var(--success) !important;
        }

        .wrong-opt {
            background: var(--error) !important;
            color: white;
            border-color: var(--error) !important;
            animation: shake 0.4s ease;
        }

        /* Neustart Button am Ende */
        .restart-btn {
            background: var(--primary);
            color: white;
            text-align: center !important;
            font-weight: bold;
            background-color: #2c3e50;
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @media (max-width: 600px) {
            .chat-container { height: 100%; }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <header>
        <div class="avatar">И</div>
        <div class="info">
            <h2>Ира</h2>
            <p id="statusText">online</p>
        </div>
    </header>

    <div class="chat-window" id="chatWindow"></div>

    <div id="typingIndicator" class="typing">Ира пишет...</div>

    <div class="options-area" id="optionsArea"></div>
</div>

<script>
    const dialogue = [
        {
            ira: "Привет! Как дела? Где вы учились?",
            options: [
                { text: "Я учился в Москве в университете.", correct: true },
                { text: "Я работаю в банке.", correct: false },
                { text: "Я буду преподавателем.", correct: false }
            ]
        },
        {
            ira: "Понятно. А что вы изучали?",
            options: [
                { text: "Я изучал в институте.", correct: false },
                { text: "Я изучала русский язык и литературу.", correct: true },
                { text: "Я окончил бакалавриат.", correct: false }
            ]
        },
        {
            ira: "Интересно! Кем вы сейчас работаете?",
            options: [
                { text: "Я работаю в университете.", correct: false },
                { text: "Я работаю преподаватель.", correct: false },
                { text: "Я работаю преподавателем.", correct: true }
            ]
        },
        {
            ira: "А где вы работаете? В офисе или дома?",
            options: [
                { text: "Я работаю в онлайн-шкоle.", correct: true },
                { text: "Я работаю пять лет.", correct: false },
                { text: "Я окончила магистратуру.", correct: false }
            ]
        },
        {
            ira: "Последний вопрос: почему вам нравится ваша профессия?",
            options: [
                { text: "Потому что это Москва.", correct: false },
                { text: "Потому что мне нравится помогать людям.", correct: true },
                { text: "Потому что я студентка.", correct: false }
            ]
        }
    ];

    let currentStep = 0;

    function initGame() {
        currentStep = 0;
        document.getElementById('chatWindow').innerHTML = '';
        document.getElementById('optionsArea').innerHTML = '';
        document.getElementById('statusText').textContent = "online";
        showIraMessage();
    }

    function addMessage(text, side) {
        const chatWindow = document.getElementById('chatWindow');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${side === 'ira' ? 'ira-msg' : 'user-msg'}`;
        msgDiv.textContent = text;
        chatWindow.appendChild(msgDiv);
        
        // Automatisch nach unten scrollen
        chatWindow.scrollTo({
            top: chatWindow.scrollHeight,
            behavior: 'smooth'
        });
    }

    function showIraMessage() {
        const typing = document.getElementById('typingIndicator');
        const optionsArea = document.getElementById('optionsArea');
        
        optionsArea.innerHTML = '';

        if (currentStep >= dialogue.length) {
            finishChat();
            return;
        }

        typing.style.display = 'block';

        setTimeout(() => {
            typing.style.display = 'none';
            addMessage(dialogue[currentStep].ira, "ira");
            showOptions();
        }, 1500);
    }

    function showOptions() {
        const optionsArea = document.getElementById('optionsArea');
        const currentOptions = dialogue[currentStep].options;

        currentOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt.text;
            btn.onclick = () => handleUserChoice(opt, btn);
            optionsArea.appendChild(btn);
        });
    }

    function handleUserChoice(opt, btn) {
        if (opt.correct) {
            btn.classList.add('correct-opt');
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            setTimeout(() => {
                addMessage(opt.text, "user");
                currentStep++;
                showIraMessage();
            }, 600);
        } else {
            btn.classList.add('wrong-opt');
            setTimeout(() => btn.classList.remove('wrong-opt'), 800);
        }
    }

    function finishChat() {
        const optionsArea = document.getElementById('optionsArea');
        document.getElementById('statusText').textContent = "zuletzt online";
        
        addMessage("Спасибо за разговор! До свидания! 👋", "ira");

        // Neustart Button erstellen
        setTimeout(() => {
            const restartBtn = document.createElement('button');
            restartBtn.className = 'option-btn restart-btn';
            restartBtn.textContent = "Заново (Neustart)";
            restartBtn.onclick = initGame;
            optionsArea.appendChild(restartBtn);
        }, 1000);
    }

    // Erster Start
    window.onload = initGame;
</script>

</body>
</html>
