<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vokabel-Lernkartei: Russisch - Deutsch</title>
    <style>
        :root {
            --primary-green: #2d5a27;
            --light-green: #eaf2e9;
            --accent-green: #4caf50;
            --hover-green: #388e3c;
            --card-bg: #ffffff;
            --text-color: #333;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-green);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--primary-green);
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .progress {
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--primary-green);
            font-size: 1.1rem;
        }

        /* Flashcard Container */
        .flashcard-wrapper {
            perspective: 1000px;
            width: 100%;
            aspect-ratio: 3 / 2;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: var(--shadow);
            border-radius: 15px;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 25px;
            border-radius: 15px;
            background-color: var(--card-bg);
            border: 2px solid var(--accent-green);
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #f9fff9;
        }

        .card-content {
            word-wrap: break-word;
            overflow-wrap: break-word;
            width: 100%;
            transition: font-size 0.2s;
        }

        .label {
            position: absolute;
            top: 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
        }

        /* Navigation & Buttons */
        .controls-main {
            display: flex;
            gap: 15px;
            width: 100%;
            margin-bottom: 15px;
        }

        .controls-extra {
            display: flex;
            gap: 10px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: var(--accent-green);
            color: white;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        button:hover {
            background-color: var(--hover-green);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background-color: var(--primary-green);
            font-size: 0.9rem;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 1.4rem; }
            .flashcard-wrapper { aspect-ratio: 1 / 1; }
            button { padding: 10px 12px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Lernkartei: Russisch</h1>
    
    <div class="progress" id="progress">1 / 83</div>

    <div class="flashcard-wrapper" id="cardWrapper" aria-label="Karte anklicken zum Umdrehen">
        <div class="flashcard" id="card">
            <div class="card-face card-front">
                <span class="label">Russisch</span>
                <div class="card-content" id="frontText">Загрузка...</div>
            </div>
            <div class="card-face card-back">
                <span class="label">Deutsch</span>
                <div class="card-content" id="backText">Laden...</div>
            </div>
        </div>
    </div>

    <div class="controls-main">
        <button id="prevBtn" title="Pfeiltaste links">← Vorherige</button>
        <button id="nextBtn" title="Pfeiltaste rechts">Nächste →</button>
    </div>

    <div class="controls-extra">
        <button id="shuffleBtn" class="btn-secondary">🔀 Mischen</button>
        <button id="resetBtn" class="btn-secondary" title="Taste Pos1">🏠 An den Anfang</button>
    </div>
</div>

<script>
    // Die Vokabeldaten
    const rawData = `1. профе́ссия – Beruf
2. преподава́тель – Dozent, Lehrkraft
3. учи́тель – Lehrer
4. врач – Arzt
5. по́вар – Koch
6. инжене́р – Ingenieur
7. ме́неджер – Manager
8. официа́нт – Kellner
9. води́тель – Fahrer
10. секрета́рь – Sekretär
11. строи́тель – Bauarbeiter
12. такси́ст – Taxifahrer
13. журнали́ст – Journalist
14. программи́ст – Programmierer
15. моде́ль – Model
16. дире́ктор – Direktor
17. студе́нт – Student
18. специали́ст – Spezialist, Fachkraft
19. аспира́нт – Doktorand
20. бакалавриа́т – Bachelor-Studiengang
21. магистрату́ра – Master-Studiengang
22. специалитите́т – Spezialisten-Studiengang (ehem. russisches System)
23. аспиранту́ра – Promotionsstudium, Aspirantur
24. факульте́т – Fakultät
25. университе́т – Universität
26. институ́т – Institut
27. образова́ние – Bildung
28. вы́сшее образова́ние – Hochschulbildung
29. курс – Kurs, Studienjahr
30. нау́ка – Wissenschaft
31. о́бласть – Gebiet, Bereich
32. зна́ния – Wissen, Kenntnisse
33. ру́сский язы́к – russische Sprache
34. литерату́ра – Literatur
35. культу́ра – Kultur
36. му́зыка – Musik
37. Росси́я – Russland
38. Москва́ – Moskau
39. банк – Bank
40. по́чта – Post
41. шко́ла – Schule
42. рестора́н – Restaurant
43. больни́ца – Krankenhaus
44. о́фис – Büro
45. онла́йн-шко́ла – Online-Schule
46. библиоте́ка – Bibliothek
47. чертёж – Zeichnung, Bauplan
48. пацие́нт – Patient
49. гость – Gast
50. учи́ться / научи́ться – lernen, studieren
51. изуча́ть / изучи́ть – (ein Fach) studieren, erlernen
52. ока́нчивать / око́нчить – abschließen, beenden
53. рабо́тать / порабо́тать – arbeiten
54. преподава́ть / препода́ть – unterrichten, lehren
55. учи́ть / научи́ть – lehren, jemandem etwas beibringen
56. расска́зывать / рассказа́ть – erzählen
57. нра́виться / понра́виться – gefallen
58. помога́ть / помо́чь – helfen
59. гото́вить / пригото́вить – zubereiten, kochen
60. приноси́ть / принести́ – bringen, herbringen
61. води́ть / повести́ – (ein Fahrzeug) führen, lenken
62. вози́ть / повезtí – befördern, transportieren
63. стро́ить / постро́ить – bauen
64. писа́ть / написа́ть – schreiben
65. отвеча́ть / отве́тить – antworten
66. дели́ться / подели́ться – teilen
67. понима́ть / поня́ть – verstehen
68. испо́льзовать / воспо́льзоваться – benutzen, verwenden
69. где – wo
70. что – was
71. кто – wer
72. кем – als wer (Instrumental von "кто")
73. почему́ – warum
74. ра́ньше – früher
75. сейча́с – jetzt
76. сего́дня – heute
77. вчера́ – gestern
78. мно́го – viel
79. интере́сно – interessant
80. родно́й язы́к – Muttersprache
81. иностра́нец – Ausländer
82. иностра́нный – ausländisch, Fremd-
83. филологи́ческий – philologisch`;

    // Daten parsen
    let cards = rawData.split('\n').map(line => {
        const parts = line.replace(/^\d+\.\t?/, '').split(' – ');
        return {
            front: parts[0] ? parts[0].trim() : '',
            back: parts[1] ? parts[1].trim() : ''
        };
    });

    let currentIndex = 0;

    const card = document.getElementById('card');
    const frontText = document.getElementById('frontText');
    const backText = document.getElementById('backText');
    const progress = document.getElementById('progress');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const resetBtn = document.getElementById('resetBtn');

    function updateCard() {
        // Karte erst zurückdrehen, falls sie umgedreht war
        card.classList.remove('is-flipped');
        
        // Timeout für die Animation, damit man den Textwechsel nicht sieht
        setTimeout(() => {
            const currentData = cards[currentIndex];
            frontText.textContent = currentData.front;
            backText.textContent = currentData.back;
            
            // Schriftgröße anpassen
            adjustFontSize(frontText, currentData.front);
            adjustFontSize(backText, currentData.back);
            
            progress.textContent = `${currentIndex + 1} / ${cards.length}`;
        }, 150);
    }

    function adjustFontSize(element, text) {
        if (text.length > 50) {
            element.style.fontSize = '1.1rem';
        } else if (text.length > 25) {
            element.style.fontSize = '1.4rem';
        } else {
            element.style.fontSize = '2rem';
        }
    }

    function flipCard() {
        card.classList.toggle('is-flipped');
    }

    function nextCard() {
        if (currentIndex < cards.length - 1) {
            currentIndex++;
            updateCard();
        } else {
            // Optional: Zum Anfang springen am Ende
            currentIndex = 0;
            updateCard();
        }
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            updateCard();
        }
    }

    function shuffleCards() {
        // Fisher-Yates Shuffle
        for (let i = cards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cards[i], cards[j]] = [cards[j], cards[i]];
        }
        currentIndex = 0;
        updateCard();
    }

    function resetToStart() {
        currentIndex = 0;
        updateCard();
    }

    // Event Listener
    document.getElementById('cardWrapper').addEventListener('click', flipCard);
    nextBtn.addEventListener('click', nextCard);
    prevBtn.addEventListener('click', prevCard);
    shuffleBtn.addEventListener('click', shuffleCards);
    resetBtn.addEventListener('click', resetToStart);

    // Tastatursteuerung
    document.addEventListener('keydown', (e) => {
        switch(e.key) {
            case ' ':
            case 'Enter':
                e.preventDefault(); // Verhindert Scrollen bei Leertaste
                flipCard();
                break;
            case 'ArrowRight':
                nextCard();
                break;
            case 'ArrowLeft':
                prevCard();
                break;
            case 'Home':
                resetToStart();
                break;
        }
    });

    // Initialisierung
    updateCard();
</script>

</body>
</html>
