<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Übung: Interaktive Karte</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --success: #27ae60;
            --error: #c0392b;
            --bg: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 { color: var(--primary); margin-bottom: 5px; font-size: 1.6rem; }
        p.desc { color: #666; margin-bottom: 20px; }

        .map-container {
            position: relative;
            width: 100%;
            line-height: 0;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            background-color: #acc6f3; /* Wasserfarbe als Hintergrund falls Bild lädt */
        }

        .map-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Marker-Styling */
        .marker {
            position: absolute;
            width: 22px;
            height: 22px;
            background-color: var(--accent);
            border: 3px solid white;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .marker:hover {
            transform: translate(-50%, -50%) scale(1.3);
            background-color: #3498db;
        }

        /* Pulsierender Effekt */
        .marker::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: var(--accent);
            opacity: 0.6;
            animation: pulse 2s infinite;
            z-index: -1;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(2.8); opacity: 0; }
        }

        .task-card {
            display: none;
            background: #f8f9fa;
            border-left: 6px solid #3498db;
            padding: 25px;
            border-radius: 8px;
            text-align: left;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .story-text {
            font-size: 1.2rem;
            color: #2c3e50;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
            color: #34495e;
            font-size: 1.1rem;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        .option-btn {
            padding: 14px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            font-weight: 500;
        }

        .option-btn:hover { border-color: #3498db; background: #ebf5fb; }
        .option-btn.correct { background: var(--success); color: white; border-color: var(--success); }
        .option-btn.wrong { background: var(--error); color: white; border-color: var(--error); }

        .feedback { margin-top: 20px; font-weight: bold; text-align: center; font-size: 1.1rem; }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            .marker { width: 18px; height: 18px; }
            .story-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Карта профессий</h1>
    <p class="desc">Klicke auf die roten Punkte in Russland, um die Aufgaben zu öffnen.</p>

    <div class="map-container">
        <!-- Das Kartenbild -->
        <img src="russland_karte.jpg" alt="Karte von Russland">

        <!-- KORRIGIERTE MARKER-POSITIONEN -->
        <!-- Sankt Petersburg (Nordwestlich an der Bucht) -->
        <div class="marker" style="left: 13.5%; top: 34%;" onclick="showTask(1)" title="Санкт-Петербург"></div>
        
        <!-- Moskau (Etwas südöstlich von SPb) -->
        <div class="marker" style="left: 16%; top: 44%;" onclick="showTask(0)" title="Москва"></div>
        
        <!-- Jekaterinburg (Am Ural-Gebirge) -->
        <div class="marker" style="left: 28%; top: 49%;" onclick="showTask(2)" title="Екатеринбург"></div>
        
        <!-- Novosibirsk (Süd-Zentral-Sibirien) -->
        <div class="marker" style="left: 42%; top: 58%;" onclick="showTask(3)" title="Новосибирск"></div>
        
        <!-- Vladivostok (Ganz im Osten am Meer) -->
        <div class="marker" style="left: 88%; top: 80%;" onclick="showTask(4)" title="Владивосток"></div>
    </div>

    <div id="taskCard" class="task-card">
        <div id="story" class="story-text"></div>
        <div id="question" class="question-text"></div>
        <div id="options" class="options-grid"></div>
        <div id="feedback" class="feedback"></div>
    </div>
</div>

<script>
    const data = [
        {
            text: "Здесь живёт Иван. Он учился в Москве в университете. Сейчас Иван работает инженером. Ему нравится его работа.",
            q: "Кем работает Иван?",
            options: ["Он врач", "Он инженер", "Он повар"],
            correct: 1
        },
        {
            text: "Это Елена. Она окончила медицинский институт в Санкт-Петербурге. Теперь она работает врачом в большой больнице.",
            q: "Где работает Елена?",
            options: ["В банке", "В школе", "В больнице"],
            correct: 2
        },
        {
            text: "Дмитрий живёт в Екатеринбурге. Он изучал историю в университете. Сейчас он работает преподавателем в школе.",
            q: "Что изучал Дмитрий?",
            options: ["Историю", "Биологию", "Математику"],
            correct: 0
        },
        {
            text: "Мария живёт в Новосибирске. Она окончила магистратуру три года назад. Сейчас она работает менеджером в офисе.",
            q: "Когда Мария окончила магистратуру?",
            options: ["Один год назад", "Пять лет назад", "Три года назад"],
            correct: 2
        },
        {
            text: "Алексей работает во Владивостоке. Он водит машину и перевозят почту. Он водитель.",
            q: "Кем работает Алексей?",
            options: ["Он водитель", "Он официант", "Он менеджер"],
            correct: 0
        }
    ];

    function showTask(index) {
        const task = data[index];
        const card = document.getElementById('taskCard');
        const optionsDiv = document.getElementById('options');
        
        card.style.display = 'block';
        document.getElementById('story').textContent = task.text;
        document.getElementById('question').textContent = task.q;
        document.getElementById('feedback').textContent = '';
        optionsDiv.innerHTML = '';

        task.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => {
                const feedback = document.getElementById('feedback');
                if (i === task.correct) {
                    btn.className = 'option-btn correct';
                    feedback.innerHTML = '<span style="color:var(--success)">Правильно! (Richtig!)</span>';
                    const allBtns = optionsDiv.querySelectorAll('button');
                    allBtns.forEach(b => b.onclick = null);
                } else {
                    btn.className = 'option-btn wrong';
                    feedback.innerHTML = '<span style="color:var(--error)">Попробуй ещё раз! (Versuch es nochmal!)</span>';
                }
            };
            optionsDiv.appendChild(btn);
        });

        card.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
